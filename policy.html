

<!DOCTYPE html>
<!--
Версия: policy-html-072-mobile-menu-close-cross
ИЗМЕНЕНИЯ:
- mobile: обновлён cache-buster CSS после правки крестика закрытия меню.
- mobile: размер и цвет крестика в открытом меню синхронизированы с мобильными попапами и нумерацией фотографий.
- desktop, контент, меню-логика, попапы, формы, видео и Tilda hash-bridge не изменялись.
-->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <title>Политика обработки персональных данных — Иван Перцев</title>

  <style>
    html,
    body,
    #ip-policy-root{
      width:100%;
      min-height:100%;
      margin:0;
      padding:0;
      background:#050603;
      overflow-x:hidden;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="preload" href="./assets/img/policy/background/policy-bg.webp" as="image" media="(min-width:768px)">
  <link rel="preload" href="./assets/img/policy/mobile/background/policy-mobile-bg.webp" as="image" media="(max-width:767px)">

  <link rel="stylesheet" href="./css/home.css?v=home-social-icons-stable-034">
  <link rel="stylesheet" href="./css/popups.css?v=popups-desktop-figma-radius-030">
  <link rel="stylesheet" href="./css/popups-mobile.css?v=popups-mobile-close-size-048">
  <link rel="stylesheet" href="./css/page-transition.css?v=tilda-balanced-006">
  <link rel="stylesheet" href="./css/legal.css?v=mobile-menu-close-cross-072">
  <script src="./js/tilda-lead-bridge.js?v=tilda-lead-bridge-065" defer></script>
</head>

<body>

  <div class="ip-page-transition is-enter" aria-hidden="true"></div>
  <div id="ip-policy-root"></div>

  <script>
    fetch('./pages/legal/policy.html?v=popup-close-030')
      .then(function(response){
        return response.text();
      })
      .then(function(html){
        document.getElementById('ip-policy-root').innerHTML = html;

        var pageScript = document.createElement('script');
        pageScript.src = './js/legal.js?v=' + Date.now();
        document.body.appendChild(pageScript);

        var transitionScript = document.createElement('script');
        transitionScript.src = './js/page-transition.js?v=tilda-hash-bridge-036';
        document.body.appendChild(transitionScript);
      });
  </script>

</body>
</html>
