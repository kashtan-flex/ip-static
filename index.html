<!DOCTYPE html>
<!--
Версия: index-html-060-cookie-notice-mobile-layout
ИЗМЕНЕНИЯ:
- mobile: cookie-баннер получил отдельные переносы текста, desktop-раскладка сохранена.
- global: подключён единый cookie-баннер с кнопкой «Понятно» и ссылкой на Политику.
- mobile: обновлён cache-buster общего popups-mobile.css после уменьшения визуального крестика формы.
- mobile: единый размер крестика теперь применяется ко всем формам-попапам сайта.
- desktop, меню, галереи, отзывы, контент и логика страниц не изменялись.
-->
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  

  <title>Иван Перцев — ведущий и музыкант</title>

  <style>
    html,
    body,
    #ip-home-root{
      width:100%;
      min-height:100%;
      margin:0;
      padding:0;
      background:#050603;
    }

    body{
      overflow:hidden;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/home.css?v=home-social-icons-stable-034">
  <link rel="stylesheet" href="./css/home-mobile.css?v=home-mobile-stable-dot-layer-033">
  <link rel="stylesheet" href="./css/popups.css?v=popups-desktop-figma-radius-030">
  <link rel="stylesheet" href="./css/popups-mobile.css?v=popups-mobile-close-size-048">
  <link rel="stylesheet" href="./css/page-transition.css?v=tilda-balanced-006">
  <link rel="stylesheet" href="./css/cookie-notice.css?v=cookie-notice-060">
</head>

<body>

  <div class="ip-page-transition is-enter" aria-hidden="true"></div>

  <div id="ip-home-root"></div>

  <script>
    fetch('./pages/home/home.html?v=popup-close-030')
      .then(function(response){
        return response.text();
      })
      .then(function(html){
        document.getElementById('ip-home-root').innerHTML = html;

        var script = document.createElement('script');
        script.src = './js/home.js?v=home-mobile-animation-025';
        document.body.appendChild(script);

        var transitionScript = document.createElement('script');
        transitionScript.src = './js/page-transition.js?v=tilda-hash-bridge-036';
        document.body.appendChild(transitionScript);
      });
  </script>

  <script src="./js/cookie-notice.js?v=cookie-notice-060" defer></script>

</body>
</html>
