<!DOCTYPE html>
<!--
Версия: biography-html-073-phone-mask-mobile-cross-merge
ИЗМЕНЕНИЯ:
- сохранена версия js/tilda-lead-bridge.js с отправкой заявок в Tilda и явной маской телефона +7 (___) ___-__-__.
- обновлён cache-buster Tilda lead bridge для надёжной отправки postMessage в домен Tilda.

- обновлены cache-buster для объединённой версии без отката cookie-баннера, политики, форм и Tilda hash-bridge.
- desktop, контент, видео, меню-логика, попап-вёрстка и cookie-логика не изменялись.

<html lang="ru">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  

  <title>Биография — Иван Перцев</title>

  <style>
    :root{
      --biography-vh: 1vh;
    }

    html,
    body,
    #ip-biography-root{
      width:100%;
      margin:0;
      padding:0;
      background:#050603;
    }

    html{
      min-height:100%;
      overflow-x:hidden;
    }

    body{
      min-height:100vh;
      min-height:calc(var(--biography-vh) * 100);
      overflow-x:hidden;
    }

    #ip-biography-root{
      position:relative;
      min-height:100vh;
      min-height:calc(var(--biography-vh) * 100);
    }

    @media (min-width:768px){

      html,
      body,
      #ip-biography-root{
        width:100%;
        height:100%;
        min-height:100%;
        overflow:hidden;
      }
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <link rel="stylesheet" href="./css/home.css?v=home-social-icons-stable-034">
  <link rel="stylesheet" href="./css/biography.css?v=biography-carousel-arrows-shadow-056">
  <link rel="stylesheet" href="./css/biography-mobile.css?v=mobile-menu-close-cross-073">
  <link rel="stylesheet" href="./css/popups.css?v=popups-desktop-figma-radius-030">
  <link rel="stylesheet" href="./css/popups-mobile.css?v=popups-mobile-close-size-048">
  <link rel="stylesheet" href="./css/page-transition.css?v=tilda-balanced-006">

  <link rel="stylesheet" href="./css/cookie-notice.css?v=cookie-notice-063">
</head>

<body>

  <div
    class="ip-page-transition is-enter"
    aria-hidden="true"
  ></div>

  <div id="ip-biography-root"></div>

  <script>
    (function(){
      'use strict';

      function setBiographyViewportHeight(){
        var height = window.innerHeight;

        if(window.visualViewport && window.visualViewport.height){
          height = window.visualViewport.height;
        }

        document.documentElement.style.setProperty(
          '--biography-vh',
          (height * 0.01) + 'px'
        );
      }

      setBiographyViewportHeight();

      window.addEventListener(
        'resize',
        setBiographyViewportHeight,
        { passive:true }
      );

      window.addEventListener(
        'orientationchange',
        function(){
          window.setTimeout(setBiographyViewportHeight, 250);
        },
        { passive:true }
      );

      if(window.visualViewport){
        window.visualViewport.addEventListener(
          'resize',
          setBiographyViewportHeight,
          { passive:true }
        );
      }
    })();
  </script>

  <script>
    fetch('./pages/biography/biography.html?v=biography-carousel-arrows-shadow-056')
      .then(function(response){
        if(!response.ok){
          throw new Error(
            'Не удалось загрузить pages/biography/biography.html'
          );
        }

        return response.text();
      })
      .then(function(html){
        document.getElementById(
          'ip-biography-root'
        ).innerHTML = html;

        var biographyScript =
          document.createElement('script');

        biographyScript.src =
          './js/biography.js?v=' + Date.now();

        document.body.appendChild(
          biographyScript
        );

        var transitionScript =
          document.createElement('script');

        transitionScript.src =
          './js/page-transition.js?v=tilda-hash-bridge-036';

        document.body.appendChild(
          transitionScript
        );
      })
      .catch(function(error){
        console.error(error);

        document.body.style.background =
          '#050603';

        document.body.innerHTML =
          '<pre style="color:#fff;padding:40px;font-family:Arial,sans-serif;">Ошибка загрузки страницы Биография. Проверь путь: pages/biography/biography.html</pre>';
      });
  </script>

  <script src="./js/tilda-lead-bridge.js?v=tilda-lead-bridge-075-parent-origin-fallback" defer></script>
  <script src="./js/cookie-notice.js?v=cookie-notice-063" defer></script>

</body>
</html>
