

<!DOCTYPE html>
<!--
Версия: birthday-html-082-success-text-only
ИЗМЕНЕНИЯ:
- обновлены cache-buster для mobile CSS версии 081.
- для страниц с мобильной галереей обновлён cache-buster mobile JS версии 081.
- обновлён cache-buster js/tilda-lead-bridge.js до версии 082.
- success-сообщение формы: убрана галочка, текст центрирован и оставлен на 4.2s.
- cookie, видео, Tilda T123 и desktop-режим не изменялись.
-->
<html lang="ru">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  >

  <title>День рождения — Иван Перцев</title>

  <style>
    :root{
      --birthday-vh:1vh;
      --birthday-mobile-vh:1vh;
    }

    html,
    body,
    #ip-birthday-root{
      width:100%;
      margin:0;
      padding:0;
      background:#050603;
    }

    html{
      min-height:100%;
      overflow-x:hidden;
    }

    body{
      min-height:100vh;
      min-height:calc(var(--birthday-vh) * 100);
      overflow-x:hidden;
    }

    #ip-birthday-root{
      position:relative;
      min-height:100vh;
      min-height:calc(var(--birthday-vh) * 100);
    }

    @media (min-width:768px){
      html,
      body,
      #ip-birthday-root{
        width:100%;
        height:100%;
        min-height:100%;
        overflow:hidden;
      }
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="preload" href="./assets/img/birthday/video/birthday-video-poster.webp" as="image">
  <link rel="preload" href="./assets/img/birthday/mobile/background/birthday-mobile-bg.webp" as="image">

  <link rel="stylesheet" href="./css/home.css?v=home-social-icons-stable-034">
  <link rel="stylesheet" href="./css/popups.css?v=popups-desktop-figma-radius-030">
  <link rel="stylesheet" href="./css/popups-mobile.css?v=popups-mobile-close-size-048">
  <link rel="stylesheet" href="./css/page-transition.css?v=tilda-balanced-006">
  <link rel="stylesheet" href="./css/cookie-notice.css?v=cookie-notice-063">
</head>

<body>

  <div class="ip-page-transition is-enter" aria-hidden="true"></div>
  <div id="ip-birthday-root"></div>

  <script>
    (function(){
      'use strict';

      var MOBILE_BREAKPOINT = 767;
      var BREAKPOINT_DEBOUNCE = 120;
      var root = document.getElementById('ip-birthday-root');
      var currentMode = null;
      var resizeTimer = null;
      var loadedStyles = [];
      var loadedScript = null;
      var loadToken = 0;

      function getMode(){
        return window.innerWidth <= MOBILE_BREAKPOINT ? 'mobile' : 'desktop';
      }

      function setViewportHeight(){
        var height = window.innerHeight;

        if(window.visualViewport && window.visualViewport.height){
          height = window.visualViewport.height;
        }

        document.documentElement.style.setProperty('--birthday-vh', (height * 0.01) + 'px');
        document.documentElement.style.setProperty('--birthday-mobile-vh', (height * 0.01) + 'px');
      }

      function getConfig(mode){
        if(mode === 'mobile'){
          return {
            css:['./css/birthday-mobile.css?v=mobile-menu-gallery-cross-081'],
            html:'./pages/birthday/birthday-mobile.html?v=mobile-video-sound-049',
            js:'./js/birthday-mobile.js?v=mobile-gallery-tap-081',
            error:'Ошибка загрузки мобильной страницы День рождения. Проверь путь: pages/birthday/birthday-mobile.html'
          };
        }

        return {
          css:['./css/birthday.css?v=desktop-gallery-arrows-052', './css/birthday-reviews.css?v=desktop-review-arrows-050'],
          html:'./pages/birthday/birthday.html?v=desktop-gallery-arrows-052',
          js:'./js/birthday.js',
          error:'Ошибка загрузки страницы День рождения. Проверь путь: pages/birthday/birthday.html'
        };
      }

      function resetState(){
        document.documentElement.classList.remove('ip-popup-lock');
        document.body.classList.remove('ip-popup-lock');
        document.documentElement.style.height = '';
        document.body.style.height = '';
        document.documentElement.style.overflowX = '';
        document.body.style.overflowX = '';
        document.documentElement.style.overflowY = '';
        document.body.style.overflowY = '';
        document.documentElement.style.removeProperty('--birthday-scale');
        document.documentElement.style.removeProperty('--birthday-mobile-scale');
        document.documentElement.style.removeProperty('--birthday-mobile-page-height');
      }

      function clearPageAssets(){
        loadedStyles.forEach(function(link){
          if(link && link.parentNode){
            link.parentNode.removeChild(link);
          }
        });

        loadedStyles = [];

        if(loadedScript && loadedScript.parentNode){
          loadedScript.parentNode.removeChild(loadedScript);
        }

        loadedScript = null;
      }

      function loadStylesheet(href){
        return new Promise(function(resolve, reject){
          var link = document.createElement('link');
          link.rel = 'stylesheet';
          link.href = href;
          link.setAttribute('data-birthday-page-style', 'true');
          link.onload = function(){ resolve(link); };
          link.onerror = reject;
          document.head.appendChild(link);
        });
      }

      function loadScript(src){
        return new Promise(function(resolve, reject){
          var script = document.createElement('script');
          script.src = src + '?v=' + Date.now();
          script.defer = true;
          script.setAttribute('data-birthday-page-script', 'true');
          script.onload = function(){
            loadedScript = script;
            resolve(script);
          };
          script.onerror = reject;
          document.body.appendChild(script);
        });
      }

      function loadPage(mode){
        var config = getConfig(mode);
        var token = loadToken + 1;
        loadToken = token;
        currentMode = mode;

        resetState();
        clearPageAssets();
        root.innerHTML = '';

        Promise.all(config.css.map(loadStylesheet))
          .then(function(links){
            if(token !== loadToken){
              throw new Error('stale-load');
            }
            loadedStyles = links;
            return fetch(config.html);
          })
          .then(function(response){
            if(!response.ok){
              throw new Error(config.error);
            }
            return response.text();
          })
          .then(function(html){
            if(token !== loadToken){
              throw new Error('stale-load');
            }
            root.innerHTML = html;
            return loadScript(config.js);
          })
          .then(function(){
            if(!document.querySelector('script[data-page-transition-script]')){
              var transitionScript = document.createElement('script');
              transitionScript.src = './js/page-transition.js?v=tilda-hash-bridge-036';
              transitionScript.defer = true;
              transitionScript.setAttribute('data-page-transition-script', 'true');
              document.body.appendChild(transitionScript);
            }
          })
          .catch(function(error){
            if(error && error.message === 'stale-load'){
              return;
            }
            console.error(error);
            root.innerHTML = '<pre style="color:#fff;padding:40px;font-family:Arial,sans-serif;">' + config.error + '</pre>';
          });
      }

      function scheduleModeCheck(){
        if(resizeTimer){
          window.clearTimeout(resizeTimer);
        }

        resizeTimer = window.setTimeout(function(){
          var nextMode = getMode();
          if(nextMode !== currentMode){
            loadPage(nextMode);
          }
        }, BREAKPOINT_DEBOUNCE);
      }

      if(!root){
        return;
      }

      setViewportHeight();
      loadPage(getMode());

      window.addEventListener('resize', function(){
        setViewportHeight();
        scheduleModeCheck();
      }, { passive:true });

      window.addEventListener('orientationchange', function(){
        window.setTimeout(function(){
          setViewportHeight();
          scheduleModeCheck();
        }, 250);
      }, { passive:true });

      if(window.visualViewport){
        window.visualViewport.addEventListener('resize', function(){
          setViewportHeight();
          scheduleModeCheck();
        }, { passive:true });
      }
    })();
  </script>

  <script src="./js/tilda-lead-bridge.js?v=tilda-lead-bridge-082-success-text-only" defer></script>
  <script src="./js/cookie-notice.js?v=cookie-notice-063" defer></script>

</body>
</html>
