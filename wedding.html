      var root = document.getElementById('ip-wedding-root');

      var currentMode = null;
      var resizeTimer = null;
      var loadedPageStyles = [];
      var loadedPageScript = null;
      var loadToken = 0;

      function isMobileViewport(){
        return window.innerWidth <= MOBILE_BREAKPOINT;
      }

      function getMode(){
        return isMobileViewport() ? 'mobile' : 'desktop';
      }

      function setWeddingViewportHeight(){
        var height = window.innerHeight;

        if(window.visualViewport && window.visualViewport.height){
          height = window.visualViewport.height;
        }

        document.documentElement.style.setProperty(
          '--wedding-vh',
          (height * 0.01) + 'px'
        );

        document.documentElement.style.setProperty(
          '--wedding-mobile-vh',
          (height * 0.01) + 'px'
        );
      }

      function loadStylesheet(href){
        return new Promise(function(resolve, reject){
          var existing = document.querySelector(
            'link[data-wedding-page-style][href="' + href + '"]'
          );

          if(existing){
            resolve(existing);
            return;
          }

          var link = document.createElement('link');

          link.rel = 'stylesheet';
          link.href = href;
          link.setAttribute('data-wedding-page-style', 'true');

          link.onload = function(){
            resolve(link);
          };

          link.onerror = reject;

          document.head.appendChild(link);
        });
      }

      function removePageStyles(){
        loadedPageStyles.forEach(function(link){
          if(link && link.parentNode){
            link.parentNode.removeChild(link);
          }
        });

        loadedPageStyles = [];
      }

      function removePageScript(){
        if(loadedPageScript && loadedPageScript.parentNode){
          loadedPageScript.parentNode.removeChild(loadedPageScript);
        }

        loadedPageScript = null;
      }

      function loadScript(src){
        return new Promise(function(resolve, reject){
          var script = document.createElement('script');

          script.src = src + (src.indexOf('?') === -1 ? '?v=' : '&v=') + Date.now();
          script.defer = true;
          script.setAttribute('data-wedding-page-script', 'true');

          script.onload = function(){
            loadedPageScript = script;
            resolve(script);
          };

          script.onerror = reject;

          document.body.appendChild(script);
        });
      }

      function getPageConfig(mode){
        if(mode === 'mobile'){
          return {
            mode:'mobile',
            css:[
              './css/wedding-mobile.css?v=mobile-video-ready-070'
            ],
            html:'./pages/wedding/wedding-mobile.html?v=mobile-video-sound-049',
            inlineHtml:null,
            js:'./js/wedding-mobile.js?v=mobile-video-ready-070',
            error:'Ошибка загрузки мобильной страницы Свадьба. Проверь путь: pages/wedding/wedding-mobile.html'
          };
        }

        return {
          mode:'desktop',
          css:[
            './css/wedding.css?v=desktop-media-guard-071',
            './css/project-reviews.css?v=desktop-review-arrows-050'
          ],
          html:'./pages/wedding/wedding.html?v=desktop-gallery-arrows-052',
          inlineHtml:null,
          js:'./js/wedding.js',
          error:'Ошибка загрузки страницы Свадьба. Проверь путь: pages/wedding/wedding.html'
        };
      }

      function resetDocumentState(){
        document.documentElement.classList.remove('ip-popup-lock');
        document.body.classList.remove('ip-popup-lock');

        document.documentElement.style.height = '';
        document.body.style.height = '';

        document.documentElement.style.overflowX = '';
        document.body.style.overflowX = '';

        document.documentElement.style.overflowY = '';
        document.body.style.overflowY = '';

        document.documentElement.style.removeProperty('--wedding-scale');
        document.documentElement.style.removeProperty('--wedding-mobile-scale');
        document.documentElement.style.removeProperty('--wedding-mobile-page-height');
      }

      function initViewportListeners(){
        setWeddingViewportHeight();

        window.addEventListener(
          'resize',
          function(){
            setWeddingViewportHeight();
            scheduleBreakpointCheck();
          },
          { passive:true }
        );

        window.addEventListener(
          'orientationchange',
          function(){
            window.setTimeout(function(){
              setWeddingViewportHeight();
              scheduleBreakpointCheck();
            }, 250);
          },
          { passive:true }
        );

        if(window.visualViewport){
          window.visualViewport.addEventListener(
            'resize',
            function(){
              setWeddingViewportHeight();
              scheduleBreakpointCheck();
            },
            { passive:true }
          );
        }
      }

      function scheduleBreakpointCheck(){
        if(resizeTimer){
          window.clearTimeout(resizeTimer);
        }

        resizeTimer = window.setTimeout(function(){
          var nextMode = getMode();

          if(nextMode !== currentMode){
            loadPage(nextMode);
          }
        }, BREAKPOINT_DEBOUNCE);
      }

      function loadHtml(config){
        if(config.inlineHtml !== null){
          return Promise.resolve(config.inlineHtml);
        }

        return fetch(config.html)
          .then(function(response){
            if(!response.ok){
              throw new Error(config.error);
            }

            return response.text();
          });
      }

      function loadPage(mode){
        var config = getPageConfig(mode);
        var token = loadToken + 1;

        loadToken = token;
        currentMode = mode;

        resetDocumentState();
        removePageScript();
        removePageStyles();

        root.innerHTML = '';

        Promise.all(
          config.css.map(function(href){
            return loadStylesheet(href);
          })
        )
          .then(function(links){
            if(token !== loadToken){
              return Promise.reject(new Error('stale-load'));
            }

            loadedPageStyles = links;

            return loadHtml(config);
          })
          .then(function(html){

            if(token !== loadToken){
              return Promise.reject(new Error('stale-load'));
            }

            root.innerHTML = html;

            return loadScript(config.js);
          })
          .then(function(){

            if(token !== loadToken){
              return Promise.reject(new Error('stale-load'));
            }

            if(!document.querySelector('script[data-page-transition-script]')){
              var transitionScript = document.createElement('script');

              transitionScript.src = './js/page-transition.js?v=page-transition-menu-current-close-068';
              transitionScript.defer = true;
              transitionScript.setAttribute('data-page-transition-script', 'true');

              document.body.appendChild(transitionScript);
            }
          })
          .catch(function(error){

            if(error && error.message === 'stale-load'){
              return;
            }

            console.error(error);

            document.body.style.background = '#050603';

            root.innerHTML =
              '<pre style="color:#fff;padding:40px;font-family:Arial,sans-serif;">' +
              config.error +
              '</pre>';
          });
      }

      if(!root){
        return;
      }

      initViewportListeners();
      loadPage(getMode());

    })();
  </script>
